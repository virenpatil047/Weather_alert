name: Weather Alert

on:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST
  workflow_dispatch:

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run app
        env:
          account_sid: ${{ secrets.TWILIO_SID }}
          auth_token: ${{ secrets.TWILIO_TOKEN }}
          api_key: ${{ secrets.OWM_API_KEY }}
        run: |
          python main.py
